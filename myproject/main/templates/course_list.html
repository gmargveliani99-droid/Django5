<!DOCTYPE html>
<html>
<head>
    <title>Courses</title>
</head>
<body>

<h1>Course List</h1>

<a href="/course/"><button>➕ Add Course</button></a>
<a href="/"><button>🏠 Home</button></a>

<hr>

{% for course in courses %}

    <div style="border:1px solid #ccc; padding:10px; margin:10px;">
        <h3>{{ course.title }}</h3>
        <p>Duration: {{ course.duration }} months</p>
    </div>

{% empty %}

    <p>No courses yet</p>

{% endfor %}

</body>
</html>
