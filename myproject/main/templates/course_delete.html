<!DOCTYPE html>
<html>
<head>
    <title>Delete Course</title>
</head>
<body>

<h2>Are you sure you want to delete "{{ course.title }}"?</h2>

<p>Duration: {{ course.duration }} months</p>

<form method="POST">
    {% csrf_token %}
    <button type="submit">Yes, Delete</button>
</form>

<br>

<a href="{% url 'course_list' %}">Cancel</a>

</body>
</html>
