<!DOCTYPE html>
<html>
<head>
    <title>Product List</title>
</head>
<body>

<h1>Products</h1>

<a href="/product/">➕ Add Product</a>

<hr>

{% for product in products %}

    <div style="border:1px solid #ccc; padding:10px; margin:10px;">
        <h3>Name: {{ product.name }}</h3>
        <p>Price: {{ product.price }}</p>
    </div>

{% empty %}

    <p>No products yet 😢</p>

{% endfor %}

</body>
</html>
